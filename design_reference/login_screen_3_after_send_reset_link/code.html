<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bingo App - Forgot Password Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#478a00",
                        "background-light": "#F4F5F4",
                        "background-dark": "#19230f",
                        "success-bg": "#ecfdf5",
                        "success-text": "#065f46"
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "inter": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#F4F5F4] dark:bg-background-dark font-inter text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="fixed top-0 left-0 w-full h-11 bg-[#F4F5F4]/80 dark:bg-background-dark/80 backdrop-blur-md z-50 flex items-end justify-between px-8 pb-2">
<span class="text-[15px] font-semibold tracking-tight">9:41</span>
<div class="flex gap-1.5 items-center mb-0.5">
<span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[20px]">battery_full</span>
</div>
</div>
<main class="flex-1 flex flex-col px-6 pt-24 pb-12 max-w-md mx-auto w-full">
<div class="flex justify-center mb-8">
<div class="bg-primary/10 dark:bg-primary/20 p-5 rounded-full">
<span class="material-symbols-outlined text-primary text-5xl">eco</span>
</div>
</div>
<header class="text-center mb-8">
<h1 class="text-slate-900 dark:text-white text-[32px] font-bold leading-tight tracking-tight mb-2 font-inter">Check your email</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal font-inter">We've sent password recovery instructions to your email address.</p>
</header>
<div class="mb-6 bg-emerald-50 dark:bg-emerald-950/30 border border-emerald-100 dark:border-emerald-900/50 rounded-xl p-4 flex items-center gap-3">
<span class="material-symbols-outlined text-emerald-600 dark:text-emerald-400">check_circle</span>
<p class="text-emerald-800 dark:text-emerald-300 text-sm font-medium font-inter">Reset link sent to your email.</p>
</div>
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1 font-inter">Email Address</label>
<div class="relative">
<input class="form-input flex w-full h-14 rounded-xl text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 px-4 text-base font-normal font-inter cursor-not-allowed" disabled="" type="email" value="nature.lover@example.com"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-300 dark:text-slate-600">lock</span>
</div>
</div>
<button class="w-full h-14 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4 font-inter">
<span class="material-symbols-outlined">arrow_back</span>
<span>Back to Login</span>
</button>
</div>
<div class="mt-auto pt-8 text-center safe-bottom">
<p class="text-slate-600 dark:text-slate-400 text-sm font-inter">
                Didn't receive the email? 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1 font-inter" href="#">Resend link</a>
</p>
</div>
<div class="fixed bottom-0 left-0 w-full h-32 -z-10 opacity-10 pointer-events-none overflow-hidden">
<svg class="w-full h-full fill-primary" preserveAspectRatio="none" viewBox="0 0 100 100">
<path d="M0 100 C 20 0 50 0 100 100 Z"></path>
</svg>
</div>
</main>

</body></html>
