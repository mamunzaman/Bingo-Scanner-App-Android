<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Manual Entry - Enhanced Save Flow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4C8C00",
                        "background-light": "#f7f8f5",
                        "background-dark": "#19230f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "sans": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "12px",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-sans;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e1e7da;
            border-radius: 10px;
        }
        .bingo-cell {
            @apply aspect-square flex items-center justify-center rounded-lg border text-[22px] font-semibold transition-all duration-200;
            @apply bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700 text-slate-900 dark:text-slate-100;
            font-family: 'Inter', sans-serif;
        }
        .bingo-cell-active {
            @apply border-[2px] border-primary bg-primary/5 text-primary !important;
            @apply ring-0 outline-none;
        }
        .bingo-number-text {
            font-family: 'Inter', sans-serif;
            @apply font-semibold text-center;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="sticky top-0 z-10 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 h-16 border-b border-slate-200 dark:border-slate-800">
<button class="p-2 -ml-2 rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">arrow_back</span>
</button>
<h1 class="ml-4 text-xl font-semibold">Manual Entry</h1>
</header>
<main class="flex-1 flex flex-col max-w-md mx-auto w-full px-4 pt-6 pb-6 overflow-y-auto">
<div class="mb-6">
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Create New Sheet</h2>
<p class="text-slate-600 dark:text-slate-400 mt-1 text-base">Enter 25 numbers for your 5x5 grid</p>
</div>
<div class="grid grid-cols-5 gap-2 mb-8">
<div class="bingo-cell bingo-cell-active bingo-number-text">12</div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
<div class="bingo-cell bingo-number-text"></div>
</div>
<div class="flex flex-col gap-3">
<button class="w-full h-14 rounded-xl bg-primary text-white font-bold text-lg flex items-center justify-center transition-opacity active:opacity-90">
                Save &amp; Add to Live Play
            </button>
<button class="w-full h-14 rounded-xl border-2 border-slate-300 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-300 font-bold text-lg transition-colors active:bg-slate-100 dark:active:bg-slate-800">
                Save Sheet Only
            </button>
</div>
</main>
<div class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 p-2 pb-8 sm:pb-4">
<div class="grid grid-cols-3 gap-2 max-w-md mx-auto">
<button class="h-14 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-medium active:bg-slate-200 dark:active:bg-slate-700 transition-colors">1</button>
<button class="h-14 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-medium active:bg-slate-200 dark:active:bg-slate-700 transition-colors">2</button>
<button class="h-14 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-medium active:bg-slate-200 dark:active:bg-slate-700 transition-colors">3</button>
<button class="h-14 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-medium active:bg-slate-200 dark:active:bg-slate-700 transition-colors">4</button>
<button class="h-14 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-medium active:bg-slate-200 dark:active:bg-slate-700 transition-colors">5</button>
<button class="h-14 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-medium active:bg-slate-200 dark:active:bg-slate-700 transition-colors">6</button>
<button class="h-14 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-medium active:bg-slate-200 dark:active:bg-slate-700 transition-colors">7</button>
<button class="h-14 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-medium active:bg-slate-200 dark:active:bg-slate-700 transition-colors">8</button>
<button class="h-14 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-medium active:bg-slate-200 dark:active:bg-slate-700 transition-colors">9</button>
<button class="h-14 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-medium active:bg-slate-200 dark:active:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-red-500">backspace</span>
</button>
<button class="h-14 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-2xl font-medium active:bg-slate-200 dark:active:bg-slate-700 transition-colors">0</button>
<button class="h-14 bg-primary text-white rounded-lg flex items-center justify-center text-xl font-bold active:opacity-80 transition-opacity">
                NEXT
            </button>
</div>
</div>

</body></html>
