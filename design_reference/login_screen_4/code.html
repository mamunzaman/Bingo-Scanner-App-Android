<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bingo App - Dialog Variants</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#478a00",
                        "background-light": "#f7f8f5",
                        "background-dark": "#19230f",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "inter": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "dialog": "28px",
                        "xl": "1.5rem",
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .dialog-overlay {
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
        }
        .dialog-container {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-200 dark:bg-slate-950 font-inter">
<div class="max-w-md mx-auto min-h-screen flex flex-col gap-8 py-12 px-4">
<h1 class="text-slate-500 text-xs font-bold uppercase tracking-widest text-center mb-2">Dialog Component Variants</h1>
<div class="relative w-full aspect-[4/3] rounded-3xl overflow-hidden border border-slate-300 dark:border-slate-800 shadow-2xl">
<div class="absolute inset-0 bg-background-light dark:bg-background-dark p-6 opacity-40 grayscale pointer-events-none">
<div class="w-12 h-12 bg-primary/20 rounded-full mb-4"></div>
<div class="h-4 w-3/4 bg-slate-300 rounded mb-2"></div>
<div class="h-4 w-1/2 bg-slate-300 rounded mb-8"></div>
<div class="grid grid-cols-2 gap-4">
<div class="h-20 bg-slate-200 rounded-xl"></div>
<div class="h-20 bg-slate-200 rounded-xl"></div>
</div>
</div>
<div class="absolute inset-0 dialog-overlay flex items-center justify-center p-6">
<div class="bg-white dark:bg-slate-900 w-full rounded-dialog dialog-container p-[24px]">
<h2 class="text-slate-900 dark:text-white text-xl font-bold mb-2">Are you sure?</h2>
<p class="text-slate-600 dark:text-slate-400 text-base mb-8">Do you want to continue?</p>
<div class="flex gap-3 justify-end">
<button class="px-6 h-12 rounded-full border border-primary text-primary font-bold text-sm hover:bg-primary/5 transition-colors">
                            Cancel
                        </button>
<button class="px-6 h-12 rounded-full bg-primary text-white font-bold text-sm shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">
                            Confirm
                        </button>
</div>
</div>
</div>
</div>
<div class="relative w-full aspect-[4/3] rounded-3xl overflow-hidden border border-slate-300 dark:border-slate-800 shadow-2xl">
<div class="absolute inset-0 bg-background-light dark:bg-background-dark p-6 opacity-40 grayscale pointer-events-none">
<div class="w-12 h-12 bg-primary/20 rounded-full mb-4"></div>
<div class="h-4 w-3/4 bg-slate-300 rounded mb-2"></div>
<div class="h-4 w-1/2 bg-slate-300 rounded mb-8"></div>
</div>
<div class="absolute inset-0 dialog-overlay flex items-center justify-center p-6">
<div class="bg-white dark:bg-slate-900 w-full rounded-dialog dialog-container p-[24px]">
<div class="flex items-center gap-3 mb-3">
<span class="material-symbols-outlined text-red-500">error</span>
<h2 class="text-slate-900 dark:text-white text-xl font-bold">Something went wrong</h2>
</div>
<p class="text-slate-600 dark:text-slate-400 text-base mb-8">Please try again in a moment.</p>
<div class="flex justify-end">
<button class="px-8 h-12 rounded-full bg-primary text-white font-bold text-sm shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">
                            OK
                        </button>
</div>
</div>
</div>
</div>
<div class="relative w-full aspect-[4/3] rounded-3xl overflow-hidden border border-slate-300 dark:border-slate-800 shadow-2xl">
<div class="absolute inset-0 bg-background-light dark:bg-background-dark p-6 opacity-40 grayscale pointer-events-none">
<div class="w-12 h-12 bg-primary/20 rounded-full mb-4"></div>
<div class="h-4 w-3/4 bg-slate-300 rounded mb-2"></div>
<div class="h-4 w-1/2 bg-slate-300 rounded mb-8"></div>
</div>
<div class="absolute inset-0 dialog-overlay flex items-center justify-center p-6">
<div class="bg-white dark:bg-slate-900 w-full rounded-dialog dialog-container p-[24px]">
<div class="flex items-center gap-3 mb-3">
<div class="bg-primary/10 p-1 rounded-full">
<span class="material-symbols-outlined text-primary">check_circle</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold">Success</h2>
</div>
<p class="text-slate-600 dark:text-slate-400 text-base mb-8">Your changes have been saved.</p>
<div class="flex justify-end">
<button class="px-8 h-12 rounded-full bg-primary text-white font-bold text-sm shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">
                            OK
                        </button>
</div>
</div>
</div>
</div>
</div>
<div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-md h-11 bg-white/20 dark:bg-black/20 backdrop-blur-md z-50 flex items-end justify-between px-8 pb-2 rounded-b-3xl pointer-events-none">
<span class="text-[15px] font-semibold tracking-tight">9:41</span>
<div class="flex gap-1.5 items-center mb-0.5">
<span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[20px]">battery_full</span>
</div>
</div>

</body></html>
