<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Eco Bingo - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4C8C00",
              "background-ios": "#F4F5F4",
            },
            fontFamily: {
              "sans": ["Inter", "sans-serif"]
            },
          },
        },
      }
    </script>
<style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-[#F4F5F4] font-sans text-slate-900;
          min-height: 100dvh;
        }
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col items-center justify-center p-6 overflow-hidden">
<div class="h-12 w-full"></div>
<div class="flex-grow flex flex-col items-center justify-center w-full max-w-sm">
<div class="bg-white rounded-[24px] w-full aspect-square shadow-[0_10px_40px_rgba(0,0,0,0.04)] flex flex-col items-center justify-center relative mb-10 overflow-hidden">
<div class="absolute inset-0 flex items-center justify-center opacity-5">
<span class="material-symbols-outlined text-[300px]">forest</span>
</div>
<div class="relative z-10 flex flex-col items-center">
<div class="relative mb-4">
<div class="w-32 h-32 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-7xl">circle</span>
</div>
<span class="material-symbols-outlined absolute -top-4 -right-4 text-primary text-5xl">eco</span>
</div>
<div class="flex gap-2">
<span class="material-symbols-outlined text-primary/40 text-4xl">park</span>
<span class="material-symbols-outlined text-primary text-5xl">forest</span>
<span class="material-symbols-outlined text-primary/40 text-4xl">park</span>
</div>
</div>
</div>
<div class="text-center px-4">
<h1 class="text-[28px] font-bold text-slate-900 leading-tight mb-3">
                Play Bingo for Good
            </h1>
<p class="text-[18px] font-medium text-slate-500 leading-relaxed">
                Every game supports environmental projects.
            </p>
</div>
</div>
<div class="w-full max-w-sm h-20 flex items-center justify-between px-2 mb-8">
<div class="w-12"></div>
<div class="flex gap-2.5">
<div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
<div class="w-2.5 h-2.5 rounded-full bg-black/10"></div>
<div class="w-2.5 h-2.5 rounded-full bg-black/10"></div>
</div>
<button class="w-12 flex justify-end">
<span class="text-primary font-bold text-[17px] active:opacity-50 transition-opacity">
                Next
            </span>
</button>
</div>
<div class="h-2 w-32 bg-black/10 rounded-full mb-2"></div>

</body></html>
