<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Eco Bingo - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4C8C00",
              "background-light": "#F4F5F4",
            },
            fontFamily: {
              "sans": ["Inter", "sans-serif"]
            },
          },
        },
      }
    </script>
<style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-[#F4F5F4] font-sans;
          min-height: 100dvh;
        }
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="h-screen w-screen overflow-hidden flex flex-col items-center justify-between">
<div class="h-12 w-full"></div>
<div class="flex flex-col items-center justify-center flex-grow">
<div class="relative w-44 h-44 flex items-center justify-center bg-white rounded-full shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-gray-50">
<span class="material-symbols-outlined text-primary text-[96px]">
                eco
            </span>
</div>
<h1 class="mt-8 text-[42px] font-bold text-primary tracking-[0.15em] leading-none">
            BINGO
        </h1>
</div>
<div class="flex flex-col items-center w-full px-12 pb-20">
<div class="w-full max-w-[180px] h-1.5 bg-primary/10 rounded-full overflow-hidden mb-6">
<div class="w-1/3 h-full bg-primary rounded-full"></div>
</div>
<p class="text-black/50 text-sm font-medium tracking-tight">
            From Eco-Gaming
        </p>
</div>

</body></html>
