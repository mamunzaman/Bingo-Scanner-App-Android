<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bingo App - Forgot Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4C8C00",
                        "background-light": "#F4F5F4",
                        "background-dark": "#19230f",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "inter": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "12dp": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            background-color: #F4F5F4;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#F4F5F4] dark:bg-background-dark font-inter text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="fixed top-0 left-0 w-full h-11 bg-[#F4F5F4]/80 dark:bg-background-dark/80 backdrop-blur-md z-50 flex items-end justify-between px-8 pb-2">
<span class="text-[15px] font-semibold tracking-tight">9:41</span>
<div class="flex gap-1.5 items-center mb-0.5">
<span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[20px]">battery_full</span>
</div>
</div>
<nav class="fixed top-11 left-0 w-full px-4 h-14 flex items-center z-40 bg-[#F4F5F4]/80 dark:bg-background-dark/80 backdrop-blur-md">
<button aria-label="Back" class="p-2 -ml-2 text-slate-900 dark:text-white">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
</nav>
<main class="flex-1 flex flex-col px-6 pt-28 pb-12 max-w-md mx-auto w-full">
<header class="mb-8">
<h1 class="text-slate-900 dark:text-white text-[28px] font-bold leading-tight tracking-tight mb-2 font-inter">
                Forgot Password
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-[16px] leading-relaxed font-normal font-inter">
                Enter your email address and we’ll send you a reset link.
            </p>
</header>
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1 font-inter">Email Address</label>
<div class="relative">
<input class="form-input flex w-full h-14 rounded-12dp text-slate-900 dark:text-white border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-base font-normal font-inter" placeholder="example@eco.com" type="email"/>
</div>
</div>
<button class="w-full h-14 bg-[#4C8C00] text-white rounded-12dp font-bold text-lg shadow-lg shadow-primary/20 hover:bg-[#4C8C00]/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2 font-inter">
<span>Send Reset Link</span>
</button>
<div class="text-center space-y-4 pt-2">
<a class="text-[#4C8C00] text-[16px] font-semibold hover:underline decoration-2 underline-offset-4 font-inter block" href="#">
                    Remember your password? Log In
                </a>
<p class="text-slate-500 dark:text-slate-500 text-[13px] font-inter">
                    Check your inbox and spam folder.
                </p>
</div>
</div>
<div class="fixed bottom-0 left-0 w-full h-32 -z-10 opacity-5 pointer-events-none overflow-hidden">
<svg class="w-full h-full fill-primary" preserveAspectRatio="none" viewBox="0 0 100 100">
<path d="M0 100 C 20 0 50 0 100 100 Z"></path>
</svg>
</div>
</main>

</body></html>
