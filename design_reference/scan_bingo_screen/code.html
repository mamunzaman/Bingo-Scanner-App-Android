<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scan Screen Refactor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --primary: #4C8C00;
            --primary-container: #D9E9B4;
            --on-primary-container: #101F00;
            --background: #F4F5F4;
            --surface: #F4F5F4;
            --on-surface: #1A1C19;
            --on-surface-variant: #43483F;
            --outline: #73796E;
        }
        @keyframes scan {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(280px); opacity: 0; }
        }
        .scanning-line {
            animation: scan 3s ease-in-out infinite;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--on-surface);
        }
    </style>
<style>
        body {
            min-height: max(844px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col overflow-hidden">
<header class="h-16 flex items-center px-2 bg-[var(--background)] sticky top-0 z-50">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-black/5 active:bg-black/10 transition-colors">
<span class="material-symbols-outlined text-[var(--on-surface)]">arrow_back</span>
</button>
<h1 class="flex-1 text-xl font-normal ml-2 text-[var(--on-surface)]">Scan Ticket</h1>
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-black/5 active:bg-black/10 transition-colors">
<span class="material-symbols-outlined text-[var(--on-surface)]">flashlight_on</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center pt-8 px-6">
<div class="relative w-full max-w-[320px] aspect-[3/4] rounded-[24px] overflow-hidden bg-neutral-900 shadow-lg border-4 border-white/10">
<div class="absolute inset-0 bg-[linear-gradient(135deg,#1b2018_0%,#0a0b09_100%)] opacity-90 flex items-center justify-center">
<span class="material-symbols-outlined text-white/10 text-6xl">qr_code_scanner</span>
</div>
<div class="absolute top-0 left-4 right-4 h-1 bg-[var(--primary)] rounded-full shadow-[0_0_15px_2px_rgba(76,140,0,0.8)] scanning-line"></div>
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-8 left-8 w-12 h-12 border-t-4 border-l-4 border-white/40 rounded-tl-lg"></div>
<div class="absolute top-8 right-8 w-12 h-12 border-t-4 border-r-4 border-white/40 rounded-tr-lg"></div>
<div class="absolute bottom-8 left-8 w-12 h-12 border-b-4 border-l-4 border-white/40 rounded-bl-lg"></div>
<div class="absolute bottom-8 right-8 w-12 h-12 border-b-4 border-r-4 border-white/40 rounded-br-lg"></div>
</div>
</div>
<div class="mt-8 text-center space-y-2">
<p class="text-base font-medium text-[var(--on-surface)]">Align your ticket within the frame</p>
<p class="text-sm text-[var(--on-surface-variant)] px-8 leading-relaxed">Ensure the barcode is clear and well-lit for automatic detection.</p>
</div>
<div class="mt-auto mb-12 w-full max-w-[280px]">
<button class="w-full flex items-center justify-center gap-2 bg-[var(--primary)] text-white h-14 rounded-[12px] font-semibold shadow-sm hover:shadow-md active:opacity-90 transition-all">
<span class="material-symbols-outlined">keyboard</span>
<span>Enter Manually</span>
</button>
</div>
</main>
<nav class="h-20 bg-[var(--background)] flex items-center justify-around px-2 border-t border-[var(--outline)]/10 pb-2">
<a class="flex flex-col items-center gap-1 flex-1" href="#">
<div class="w-16 h-8 flex items-center justify-center rounded-full transition-colors">
<span class="material-symbols-outlined text-[var(--on-surface-variant)]">home</span>
</div>
<span class="text-xs font-medium text-[var(--on-surface-variant)]">Home</span>
</a>
<a class="flex flex-col items-center gap-1 flex-1" href="#">
<div class="w-16 h-8 flex items-center justify-center rounded-full bg-[var(--primary-container)] text-[var(--on-primary-container)]">
<span class="material-symbols-outlined filled-icon">qr_code_scanner</span>
</div>
<span class="text-xs font-bold text-[var(--on-primary-container)]">Scan</span>
</a>
<a class="flex flex-col items-center gap-1 flex-1" href="#">
<div class="w-16 h-8 flex items-center justify-center rounded-full transition-colors">
<span class="material-symbols-outlined text-[var(--on-surface-variant)]">emoji_events</span>
</div>
<span class="text-xs font-medium text-[var(--on-surface-variant)]">Jackpot</span>
</a>
<a class="flex flex-col items-center gap-1 flex-1" href="#">
<div class="w-16 h-8 flex items-center justify-center rounded-full transition-colors">
<span class="material-symbols-outlined text-[var(--on-surface-variant)]">person</span>
</div>
<span class="text-xs font-medium text-[var(--on-surface-variant)]">Profile</span>
</a>
</nav>
<div class="bg-[var(--background)] h-6 flex justify-center items-end pb-2">
<div class="w-32 h-1 bg-black/20 rounded-full"></div>
</div>

</body></html>
